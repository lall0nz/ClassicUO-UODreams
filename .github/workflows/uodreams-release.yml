name: UODreams Release

on:
  push:
    tags:
      - 'pvp-v*'
      - 'classic-v*'

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          global-json-file: global.json

      - name: Parse edition and version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^pvp-v(.+)$') {
            $edition = 'pvp'
            $version = $Matches[1]
            $title = "UODreams PVP Launcher v$version"
            $label = 'PVP'
          } elseif ($tag -match '^classic-v(.+)$') {
            $edition = 'classic'
            $version = $Matches[1]
            $title = "UODreams Launcher v$version"
            $label = 'Classic'
          } else {
            throw "Unsupported release tag: $tag (expected pvp-v* or classic-v*)"
          }
          "RELEASE_EDITION=$edition" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TITLE=$title" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_LABEL=$label" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup MSBuild (NativeAOT for PVP)
        if: env.RELEASE_EDITION == 'pvp'
        uses: microsoft/setup-msbuild@v2

      - name: Download official ClassicUO
        shell: pwsh
        run: |
          function Resolve-OfficialCuoRoot([string]$Path) {
            if (-not (Test-Path $Path)) { return $null }

            foreach ($marker in @('cuo.exe', 'ClassicUO.exe', 'cuoapi.dll')) {
              if (Test-Path (Join-Path $Path $marker)) { return $Path }
            }

            $nested = Join-Path $Path 'ClassicUO'
            if (Test-Path $nested) {
              $resolved = Resolve-OfficialCuoRoot $nested
              if ($resolved) { return $resolved }
            }

            $sub = Get-ChildItem $Path -Directory -Filter 'ClassicUO' -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($sub) {
              $resolved = Resolve-OfficialCuoRoot $sub.FullName
              if ($resolved) { return $resolved }
            }

            $cuoExe = Get-ChildItem $Path -Recurse -Filter 'cuo.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($cuoExe) { return $cuoExe.Directory.FullName }

            return $null
          }

          $zip = "$env:RUNNER_TEMP\ClassicUO-win-x64-release.zip"
          $url = 'https://github.com/ClassicUO/ClassicUO/releases/download/ClassicUO-main-release/ClassicUO-win-x64-release.zip'
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $zip -TimeoutSec 180
          if ((Get-Item $zip).Length -lt 1MB) { throw "Downloaded ClassicUO zip is too small" }

          $extractDir = "$env:RUNNER_TEMP\cuo-official"
          if (Test-Path $extractDir) { Remove-Item $extractDir -Recurse -Force }
          Expand-Archive -Path $zip -DestinationPath $extractDir -Force

          $official = Resolve-OfficialCuoRoot $extractDir
          if (-not $official) {
            throw "ClassicUO client not found in official zip (expected flat layout or ClassicUO/ subfolder)"
          }

          Write-Host "Resolved official ClassicUO root: $official"
          "OFFICIAL_CUO=$official" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build release assets
        shell: pwsh
        run: |
          $version = $env:RELEASE_VERSION
          $edition = $env:RELEASE_EDITION
          $officialCuo = $env:OFFICIAL_CUO

          if ($edition -eq 'pvp') {
            $razor = Join-Path (Get-Location) 'vendor\RazorEnhanced-Custom.zip'
            if (-not (Test-Path $razor)) {
              throw "Vendor Razor zip not found: $razor"
            }
            ./scripts/package-release.ps1 -Version $version -Edition $edition -OfficialCuo $officialCuo -RazorEnhancedZip $razor
          } else {
            ./scripts/package-release.ps1 -Version $version -Edition $edition -OfficialCuo $officialCuo
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_TITLE }}
          body: |
            ## ${{ env.RELEASE_TITLE }}

            ### Installazione
            1. Scarica **UODreams-${{ env.RELEASE_LABEL }}-Launcher-v${{ env.RELEASE_VERSION }}.zip**
            2. Estrai e avvia **UODreams Launcher.exe**
            3. Al primo avvio scarica automaticamente i componenti ClassicUO
            4. Scarica anche il client Ultima Online UODreams dal launcher (pulsante Scarica)

            ### Server
            - `login.uodreams.com:2593`
          files: |
            bin/release-${{ env.RELEASE_EDITION }}-v${{ env.RELEASE_VERSION }}/UODreams-${{ env.RELEASE_LABEL }}-Launcher-v${{ env.RELEASE_VERSION }}.zip
            bin/release-${{ env.RELEASE_EDITION }}-v${{ env.RELEASE_VERSION }}/UODreams-${{ env.RELEASE_LABEL }}-Client-v${{ env.RELEASE_VERSION }}.zip
          draft: false
          prerelease: false
